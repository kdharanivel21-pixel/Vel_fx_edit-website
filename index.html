<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vel_fx_edit</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background:
radial-gradient(circle,#00ffff22 10%,transparent 10%),
radial-gradient(circle,#ff00ff22 10%,transparent 10%);
background-size:120px 120px;
animation:bgMove 10s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{
transform:translate(0,0);
}
100%{
transform:translate(-120px,-120px);
}
}

/* HEADER */

header{
padding:40px 20px;
text-align:center;
background:linear-gradient(45deg,#ff00ff,#00ffff);
box-shadow:0 0 25px #00ffff;
}

.logo{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:5px solid #00ffff;
padding:5px;
background:#000;
box-shadow:
0 0 20px #00ffff,
0 0 40px #ff00ff;
transition:0.4s;
margin-bottom:20px;
}

.logo:hover{
transform:scale(1.05);
}

header h1{
font-size:48px;
text-shadow:0 0 20px cyan;
animation:zoom 2s infinite alternate;
}

@keyframes zoom{
0%{
transform:scale(1);
}
100%{
transform:scale(1.05);
}
}

header p{
margin-top:10px;
font-size:20px;
margin-bottom:25px;
}

/* FOLLOW BUTTON */

.follow-btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:14px 28px;
background:#0095f6;
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:12px;
box-shadow:
0 0 15px #0095f6,
0 0 30px #0095f688;
transition:0.3s;
animation:pulse 2s infinite;
}

.follow-btn:hover{
transform:scale(1.08);
background:#1877f2;
}

.follow-btn:active{
transform:scale(0.92);
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
100%{
transform:scale(1);
}
}

/* SEARCH */

.search-box{
display:flex;
justify-content:center;
align-items:center;
margin-top:40px;
padding:10px;
flex-wrap:wrap;
}

.search-box input{
width:300px;
padding:15px;
border:none;
outline:none;
font-size:18px;
border-radius:12px 0 0 12px;
}

.search-box button{
padding:15px 25px;
border:none;
background:#00ffff;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
border-radius:0 12px 12px 0;
transition:0.3s;
}

.search-box button:hover{
transform:scale(1.1);
background:#ff00ff;
color:white;
}

/* RESULTS */

#results{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:40px;
}

/* CARD */

.card{
width:320px;
background:#111;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px #00ffff;
transition:0.4s;
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 35px #ff00ff;
}

/* IMAGE */

.card img{
width:100%;
height:350px;
object-fit:cover;
border-bottom:3px solid #00ffff;
}

/* CONTENT */

.card-content{
padding:20px;
text-align:center;
}

.card-content h2{
font-size:28px;
color:#00ffff;
margin-bottom:10px;
}

.card-content p{
font-size:18px;
color:#ccc;
margin-bottom:20px;
}

/* OPEN BUTTON */

.open-btn{
display:inline-block;
padding:12px 25px;
background:#ff00ff;
color:white;
text-decoration:none;
border-radius:12px;
font-weight:bold;
transition:0.3s;
box-shadow:0 0 20px #ff00ff;
}

.open-btn:hover{
transform:scale(1.1);
background:#00ffff;
color:black;
}

/* PROMPT BOX */

.prompt-box{
width:100%;
height:140px;
background:#000;
color:#00ffff;
border:2px solid #00ffff;
border-radius:15px;
padding:15px;
font-size:15px;
margin-bottom:20px;
outline:none;
resize:none;
box-shadow:0 0 15px #00ffff55;
}

/* COPY BUTTON */

.copy-btn{
padding:14px 25px;
border:none;
background:linear-gradient(45deg,#00ffff,#ff00ff);
color:white;
font-size:16px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
transition:0.3s;
box-shadow:
0 0 15px #00ffff,
0 0 25px #ff00ff;
animation:pulse 2s infinite;
}

.copy-btn:hover{
transform:scale(1.1);
}

.copy-btn:active{
transform:scale(0.9);
}

/* FOOTER */

footer{
margin-top:50px;
padding:20px;
text-align:center;
background:#111;
box-shadow:0 0 20px #00ffff;
}

.insta{
color:#00ffff;
text-decoration:none;
font-weight:bold;
}

/* MOBILE */

@media(max-width:600px){

.logo{
width:160px;
height:160px;
}

header h1{
font-size:34px;
}

.search-box input{
width:220px;
}

.card{
width:95%;
}

.card img{
height:280px;
}

.follow-btn{
font-size:16px;
padding:12px 20px;
}

}

</style>
</head>

/* DISPLAY */

function displayVideos(list){

/* SEARCH */

function searchVideo(){

document.getElementById("searchInput")

}

const filtered =
videos.filter(video =>
video.code.includes(input)
);

/* COPY */

function copyPrompt(id){

document.getElementById(id);
