<style>
/* THEME SYSTEM CONTROLS USING DYNAMIC CSS VARIABLES */
:root {
  --primary-gradient: linear-gradient(45deg, #ff00ff, #00ffff);
  --bg-color: #000000;
  --card-bg: #111111;
  --text-color: #ffffff;
  --accent-color: #00ffff;
  --hover-glow: #ff00ff;
  --secondary-glow: #00ffff;
  --box-shadow-color: rgba(0, 255, 255, 0.4);
  --card-shadow-color: rgba(0, 255, 255, 0.6);
  --card-hover-shadow: rgba(255, 0, 255, 0.8);
}

/* THEME 2: ROYAL PURPLE & GOLD */
[data-theme="royal"] {
  --primary-gradient: linear-gradient(45deg, #ffd700, #8a2be2);
  --bg-color: #0b0518;
  --card-bg: #160f24;
  --accent-color: #ffd700;
  --hover-glow: #8a2be2;
  --secondary-glow: #ffd700;
  --box-shadow-color: rgba(255, 215, 0, 0.4);
  --card-shadow-color: rgba(255, 215, 0, 0.5);
  --card-hover-shadow: rgba(138, 43, 226, 0.9);
}

/* THEME 3: EMERALD MINT */
[data-theme="emerald"] {
  --primary-gradient: linear-gradient(45deg, #00ff87, #60efff);
  --bg-color: #040d0a;
  --card-bg: #0d1a15;
  --accent-color: #00ff87;
  --hover-glow: #60efff;
  --secondary-glow: #00ff87;
  --box-shadow-color: rgba(0, 255, 135, 0.4);
  --card-shadow-color: rgba(0, 255, 135, 0.5);
  --card-hover-shadow: rgba(96, 239, 255, 0.9);
}

/* THEME 4: CRIMSON DARK RED */
[data-theme="crimson"] {
  --primary-gradient: linear-gradient(45deg, #ff0055, #990000);
  --bg-color: #0a0104;
  --card-bg: #16040a;
  --accent-color: #ff0055;
  --hover-glow: #ffffff;
  --secondary-glow: #ff0055;
  --box-shadow-color: rgba(255, 0, 85, 0.4);
  --card-shadow-color: rgba(255, 0, 85, 0.5);
  --card-hover-shadow: rgba(255, 255, 255, 0.8);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
}

body{
background: var(--bg-color);
color: var(--text-color);
overflow-x:hidden;
min-height: 100vh;
display: flex;
flex-direction: column;
}

/* BACKGROUND PIPES ANIMATION */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background:
radial-gradient(circle, rgba(0,255,255,0.08) 10%,transparent 10%),
radial-gradient(circle, rgba(255,0,255,0.08) 10%,transparent 10%);
background-size:120px 120px;
animation:bgMove 10s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{ transform:translate(0,0); }
100%{ transform:translate(-120px,-120px); }
}

/* THEME TOGGLE FLOATING BUTTON */
.theme-switcher-btn {
position: fixed;
top: 20px;
right: 20px;
z-index: 9999;
background: var(--primary-gradient);
border: 2px solid var(--text-color);
color: #fff;
padding: 12px 20px;
border-radius: 30px;
font-weight: bold;
cursor: pointer;
box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 10px var(--accent-color);
display: flex;
align-items: center;
gap: 8px;
font-size: 14px;
text-transform: uppercase;
letter-spacing: 1px;
}

.theme-switcher-btn:hover {
transform: scale(1.05);
box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 20px var(--hover-glow);
}

.theme-switcher-btn:active {
transform: scale(0.95);
}

/* HEADER */
header{
padding:40px 20px;
text-align:center;
background: var(--primary-gradient);
box-shadow:0 0 25px var(--secondary-glow);
position: relative;
}

.logo{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:5px solid var(--accent-color);
padding:5px;
background:#000;
box-shadow:
0 0 20px var(--accent-color),
0 0 40px var(--hover-glow);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{ transform:translateY(0); }
50%{ transform:translateY(-10px); }
100%{ transform:translateY(0); }
}

header h1{
font-size:48px;
margin-top:20px;
text-shadow:0 0 20px var(--accent-color);
}

header p{
margin-top:10px;
font-size:20px;
margin-bottom:25px;
}

/* ACTION BUTTONS GRID CONTAINER */
.header-actions {
display: flex;
justify-content: center;
gap: 20px;
flex-wrap: wrap;
margin-bottom: 10px;
}

/* FOLLOW BUTTON */
.follow-btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:14px 32px;
background:#0095f6;
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:14px;
box-shadow: 0 0 15px #0095f6, 0 0 30px rgba(0,149,246,0.5);
transition:0.3s;
animation:pulse 2s infinite;
}

.follow-btn:hover{
transform:scale(1.08);
background:#1877f2;
box-shadow: 0 0 25px #0095f6;
}

.insta-icon {
width: 24px;
height: 24px;
fill: white;
}

/* TELEGRAM BUTTON */
.tg-btn {
display: inline-flex;
align-items: center;
gap: 10px;
padding: 14px 32px;
background: #24A1DE;
color: white;
text-decoration: none;
font-size: 18px;
font-weight: bold;
border-radius: 14px;
box-shadow: 0 0 15px #24A1DE, 0 0 30px rgba(36,161,222,0.5);
transition: 0.3s;
animation: pulse 2s infinite 0.5s;
}

.tg-btn:hover {
transform: scale(1.08);
background: #1d84b5;
box-shadow: 0 0 25px #24A1DE;
}

.tg-icon {
width: 24px;
height: 24px;
fill: white;
}

@keyframes pulse{
0%{ transform:scale(1); }
50%{ transform:scale(1.05); }
100%{ transform:scale(1); }
}

/* SEARCH BOX */
.search-box{
display:flex;
justify-content:center;
margin:40px 20px 20px 20px;
}

.search-box input{
width:300px;
padding:15px;
border:2px solid var(--accent-color);
border-right: none;
outline:none;
font-size:18px;
border-radius:12px 0 0 12px;
background: var(--card-bg);
color: var(--text-color);
}

.search-box button{
padding:15px 25px;
border:none;
background: var(--accent-color);
color: black;
font-size:18px;
font-weight:bold;
cursor:pointer;
border-radius:0 12px 12px 0;
transition:0.3s;
}

.search-box button:hover{
background: var(--hover-glow);
color: white;
box-shadow: 0 0 15px var(--hover-glow);
}

/* CATEGORY TABS SYSTEM */
.tab-container {
display: flex;
justify-content: center;
align-items: center;
gap: 12px;
flex-wrap: wrap;
margin: 25px auto 35px auto;
padding: 0 20px;
max-width: 1200px;
}

.tab-btn {
background: var(--card-bg);
color: var(--text-color);
border: 2px solid var(--accent-color);
padding: 12px 22px;
border-radius: 30px;
font-size: 15px;
font-weight: bold;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.tab-btn:hover {
transform: translateY(-3px);
box-shadow: 0 0 15px var(--accent-color);
background: var(--card-bg);
color: var(--accent-color);
}

.tab-btn.active {
background: var(--primary-gradient);
color: #ffffff;
border-color: transparent;
box-shadow: 0 0 20px var(--hover-glow);
}

/* SECTION TITLE */
.section-title{
text-align:center;
font-size:40px;
margin-top:40px;
margin-bottom:30px;
color: var(--accent-color);
text-shadow:0 0 20px var(--box-shadow-color);
}

/* CARD AREA */
.card-area{
display: grid;
grid-template-columns: repeat(auto-fit, minmax(320px, max-content));
justify-content: center;
gap:30px;
padding:20px;
width: 100%;
}

/* CARD */
.card{
width:320px;
background: var(--card-bg);
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px var(--card-shadow-color);
transition:0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
animation:fadeUp 1s ease;
display: flex;
flex-direction: column;
border: 1px solid rgba(255,255,255,0.05);
}

@keyframes fadeUp{
from{ opacity:0; transform:translateY(50px); }
to{ opacity:1; transform:translateY(0); }
}

.card:hover{
transform:translateY(-10px) scale(1.04);
box-shadow:0 0 35px var(--card-hover-shadow);
}

.card img{
width:100%;
aspect-ratio: 3 / 4;
object-fit:cover;
border-bottom:3px solid var(--accent-color);
object-position: center top;
}

.card-content{
padding:20px;
text-align:center;
display: flex;
flex-direction: column;
flex-grow: 1;
justify-content: space-between;
}

.card-content h2{
font-size:28px;
color: var(--accent-color);
margin-bottom:10px;
}

.card-content p{
font-size:18px;
color:#ccc;
margin-bottom:20px;
}

.open-btn{
display:inline-block;
padding:12px 25px;
background: var(--hover-glow);
color:white;
text-decoration:none;
border-radius:12px;
font-weight:bold;
transition:0.3s;
box-shadow:0 0 20px var(--hover-glow);
margin-top: auto;
}

.open-btn:hover{
transform:scale(1.1);
background: var(--accent-color);
color:black;
box-shadow: 0 0 20px var(--accent-color);
}

.copy-btn{
padding:14px 25px;
border:none;
background: var(--primary-gradient);
color:white;
font-size:16px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
transition:0.3s;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
width: 100%;
}

.copy-btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px var(--hover-glow);
}

.prompt-box{
width:100%;
height:140px;
background:#000;
color: var(--accent-color);
border:2px solid var(--accent-color);
border-radius:15px;
padding:15px;
font-size:15px;
margin-bottom:20px;
outline:none;
resize:none;
}

/* FOOTER */
footer{
margin-top: auto;
padding: 25px 20px 80px 20px;
text-align: center;
background: var(--card-bg);
box-shadow: 0 -5px 25px var(--box-shadow-color);
border-top: 1px solid rgba(255,255,255,0.05);
position: relative;
z-index: 100;
}

footer p {
font-size: 17px;
margin: 6px 0;
line-height: 1.5;
font-weight: 500;
}

/* INSTAGRAM LINK IN BLUE/ACCENT COLOR */
.insta{
color: var(--accent-color);
text-decoration: none;
font-weight: bold;
transition: all 0.3s ease;
display: inline-block;
}

.insta:hover{
color: var(--hover-glow);
text-decoration: underline;
text-shadow: 0 0 10px var(--accent-color);
}

/* MOBILE RESPONSIVENESS */
@media(max-width:600px){
.theme-switcher-btn {
top: auto;
bottom: 15px;
left: 50%;
right: auto;
transform: translateX(-50%);
padding: 10px 20px;
font-size: 13px;
white-space: nowrap;
box-shadow: 0 4px 20px rgba(0,0,0,0.8), 0 0 15px var(--accent-color);
}

.theme-switcher-btn:hover {
transform: translateX(-50%) scale(1.05);
}

.logo{
width:160px;
height:160px;
}

header h1{
font-size:34px;
}

.section-title{
font-size:30px;
}

grid-template-columns: 1fr;
padding: 10px;
}

width:100%;
}

.search-box input{
width:60%;
}
.search-box button{
width:40%;
}
.header-actions {
flex-direction: column;
align-items: center;
gap: 12px;
}
.follow-btn, .tg-btn {
width: 80%;
text-align: center;
justify-content: center;
}
.tab-container {
gap: 8px;
}
.tab-btn {
padding: 10px 16px;
font-size: 13px;
width: 100%;
text-align: center;
}

footer {
padding: 25px 15px 85px 15px;
}
}
</style>
</head>

/* DISPLAY RENDER ENGINE FUNCTIONS */
function displayVideos(items) {
  const container = document.getElementById("videoResults");
  container.innerHTML = "";
  items.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.thumbnail}" alt="${item.title}">
        <div class="card-content">
          <div>
            <h2>${item.code}</h2>
            <p>${item.title}</p>
          </div>
          <a class="open-btn" href="${item.link}" target="_blank">OPEN PRESET</a>
        </div>
      </div>
    `;
  });
}

function displayPrompts(items, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  items.forEach((item, index) => {
    const promptId = `${containerId}_prompt_${index}`;
    container.innerHTML += `
      <div class="card">
        <img src="${item.thumbnail}" alt="${item.title}">
        <div class="card-content">
          <div>
            <h2>${item.code}</h2>
            <p>${item.title}</p>
            <textarea class="prompt-box" id="${promptId}" readonly>${item.prompt}</textarea>
          </div>
          <button class="copy-btn" onclick="copyPrompt('${promptId}')">COPY PROMPT</button>
        </div>
      </div>
    `;
  });
}

function refreshAllSections(vList, bList, boyList, gList) {
  displayVideos(vList);
  displayPrompts(bList, "bothPromptResults");
  displayPrompts(boyList, "boyPromptResults");
  displayPrompts(gList, "girlPromptResults");
}

/* INITIAL RENDER */
refreshAllSections(videos, bothPrompts, boyPrompts, girlPrompts);

/* CATEGORY TABS FUNCTIONALITY */
function switchCategory(sectionId, btnElement) {
  const buttons = document.querySelectorAll('.tab-btn');
  buttons.forEach(btn => btn.classList.remove('active'));
  btnElement.classList.add('active');

  const sections = document.querySelectorAll('.category-section');
  if(sectionId === 'allSection') {
    sections.forEach(sec => sec.style.display = 'block');
  } else {
    sections.forEach(sec => sec.style.display = 'none');
    document.getElementById(sectionId).style.display = 'block';
  }
}

/* SEARCH SYSTEM ENGINE */
function searchItems(){
  const input = document.getElementById("searchInput").value.toUpperCase();
  if(input === ""){
    refreshAllSections(videos, bothPrompts, boyPrompts, girlPrompts);
    return;
  }
  const filteredVideos = videos.filter(v => v.code.toUpperCase().includes(input) || v.title.toUpperCase().includes(input));
  const filteredBoth = bothPrompts.filter(p => p.code.toUpperCase().includes(input) || p.title.toUpperCase().includes(input));
  const filteredBoys = boyPrompts.filter(p => p.code.toUpperCase().includes(input) || p.title.toUpperCase().includes(input));
  const filteredGirls = girlPrompts.filter(p => p.code.toUpperCase().includes(input) || p.title.toUpperCase().includes(input));
  
  refreshAllSections(filteredVideos, filteredBoth, filteredBoys, filteredGirls);
}

/* COPY TO CLIPBOARD FUNCTION */
function copyPrompt(id){
  const text = document.getElementById(id);
  navigator.clipboard.writeText(text.value);
  alert("Prompt Copied!");
}

/* THEME CONTROLLER ENGINE */
const themesList = ["cyberpunk", "royal", "emerald", "crimson"];
let currentThemeIndex = 0;

function toggleTheme() {
  currentThemeIndex = (currentThemeIndex + 1) % themesList.length;
  const activeTheme = themesList[currentThemeIndex];
  
  if (activeTheme === "cyberpunk") {
    document.documentElement.removeAttribute("data-theme");
  } else {
    document.documentElement.setAttribute("data-theme", activeTheme);
  }
}
